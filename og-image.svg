<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081A33"/>
      <stop offset="100%" stop-color="#0F2747"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C9A45C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A45C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rigGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#162236"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(201,164,92,0.04)" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Horizon glow behind rig -->
  <ellipse cx="920" cy="560" rx="320" ry="120" fill="url(#glow)"/>

  <!-- Rig silhouette (right side) -->
  <g fill="url(#rigGrad)">
    <!-- Main tower -->
    <polygon points="860,80 875,520 960,520 975,80" fill="#0d1e31"/>
    <!-- Crown -->
    <rect x="855" y="72" width="125" height="12" rx="2" fill="#0d1e31"/>
    <rect x="870" y="58" width="95" height="16" rx="2" fill="#0d1e31"/>
    <rect x="890" y="40" width="55" height="20" rx="2" fill="#0d1e31"/>
    <rect x="910" y="20" width="15" height="22" rx="2" fill="#0d1e31"/>
    <!-- Cross braces -->
    <rect x="862" y="140" width="111" height="5" fill="#08162a"/>
    <rect x="862" y="210" width="111" height="5" fill="#08162a"/>
    <rect x="862" y="280" width="111" height="5" fill="#08162a"/>
    <rect x="862" y="350" width="111" height="5" fill="#08162a"/>
    <rect x="862" y="420" width="111" height="5" fill="#08162a"/>
    <!-- Substructure -->
    <rect x="820" y="516" width="195" height="40" rx="3" fill="#0d1e31"/>
    <rect x="800" y="552" width="235" height="30" rx="3" fill="#0a1828"/>
    <!-- Drawworks -->
    <rect x="960" y="460" width="80" height="60" fill="#081525"/>
    <!-- Mud pit -->
    <rect x="780" y="540" width="50" height="30" rx="4" fill="#0d1e31"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="578" width="1200" height="52" fill="#050e1c"/>
  <rect x="0" y="576" width="1200" height="3" fill="#C9A45C" opacity="0.15"/>

  <!-- Left side — text content -->
  <!-- Gold accent bar -->
  <rect x="80" y="180" width="5" height="60" fill="#C9A45C" rx="2"/>

  <!-- Company name -->
  <text x="104" y="214" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="72" fill="#ffffff" letter-spacing="4">OILRIGS</text>
  <text x="104" y="214" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="72" fill="#ffffff" letter-spacing="4" text-anchor="start">
    <tspan>OILRIGS</tspan><tspan fill="#C9A45C">NOW</tspan>
  </text>

  <!-- Tagline -->
  <text x="104" y="258" font-family="Inter,Arial,sans-serif" font-size="22" fill="#A0A0A0" letter-spacing="1">Drilling Rig Sales &amp; Sourcing</text>

  <!-- Divider -->
  <line x1="104" y1="290" x2="600" y2="290" stroke="rgba(201,164,92,0.2)" stroke-width="1"/>

  <!-- Stats row -->
  <text x="104" y="340" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="40" fill="#C9A45C">119+</text>
  <text x="104" y="365" font-family="Inter,Arial,sans-serif" font-size="14" fill="#A0A0A0" letter-spacing="2">ACTIVE LISTINGS</text>

  <text x="280" y="340" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="40" fill="#C9A45C">6</text>
  <text x="280" y="365" font-family="Inter,Arial,sans-serif" font-size="14" fill="#A0A0A0" letter-spacing="2">CONTINENTS</text>

  <text x="420" y="340" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="40" fill="#C9A45C">350–3,600</text>
  <text x="420" y="365" font-family="Inter,Arial,sans-serif" font-size="14" fill="#A0A0A0" letter-spacing="2">HP RANGE</text>

  <!-- Location -->
  <text x="104" y="440" font-family="Inter,Arial,sans-serif" font-size="18" fill="#C9A45C" letter-spacing="2">HOUSTON, TX  ·  713-565-0747</text>
  <text x="104" y="468" font-family="Inter,Arial,sans-serif" font-size="16" fill="#5a7090" letter-spacing="1">new.oilrigsnow.com</text>

  <!-- Border frame -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="rgba(201,164,92,0.1)" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="614" fill="none" stroke="rgba(201,164,92,0.06)" stroke-width="1"/>
</svg>
